workflows:
  ios-workflow:
    name: Pyramid Bloxx iOS
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Build Flutter iOS (no codesign)
        script: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r pyramid_bloxx.ipa Payload
          ls -lh pyramid_bloxx.ipa

    artifacts:
      - build/ios/iphoneos/pyramid_bloxx.ipa

    publishing:
      email:
        recipients:
          - your@email.com
